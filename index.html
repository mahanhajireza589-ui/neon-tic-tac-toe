<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Neon Tic Tac Toe Ultimate</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>

:root{

--bg:#040814;
--panel:#111827cc;
--panel2:#1b2742;
--cyan:#00f7ff;
--pink:#ff00b7;
--green:#00ff95;
--yellow:#ffd54f;
--red:#ff416c;
--text:#f8fafc;
--muted:#b8c3d8;

--shadow:
0 0 10px var(--cyan),
0 0 20px var(--cyan),
0 0 45px rgba(0,247,255,.35);

}

.light{

--bg:#eef4ff;
--panel:#ffffffdd;
--panel2:#eef2ff;
--text:#222;
--muted:#556;

}

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Vazirmatn,sans-serif;

}

body{

background:
radial-gradient(circle at top,#112452,#040814 70%);

color:var(--text);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow-x:hidden;

transition:.4s;

}

body.light{

background:
linear-gradient(135deg,#eef6ff,#dce7ff);

}

canvas{

position:fixed;

inset:0;

z-index:-3;

}

.container{

width:min(1400px,95%);

display:grid;

grid-template-columns:

340px

1fr

320px;

gap:22px;

padding:20px;

}

.panel{

background:var(--panel);

backdrop-filter:blur(20px);

border-radius:26px;

padding:22px;

border:1px solid rgba(255,255,255,.08);

box-shadow:

0 0 40px rgba(0,0,0,.35);

animation:fade .8s;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(30px);

}

to{

opacity:1;
transform:none;

}

}

.logo{

font-size:34px;

font-weight:900;

text-align:center;

color:var(--cyan);

text-shadow:var(--shadow);

margin-bottom:10px;

}

.subtitle{

text-align:center;

color:var(--muted);

margin-bottom:28px;

}

.modeButtons{

display:flex;

flex-direction:column;

gap:15px;

}

.modeButtons button{

height:58px;

border:none;

border-radius:18px;

font-size:18px;

font-weight:bold;

cursor:pointer;

background:

linear-gradient(135deg,#00d9ff,#0062ff);

color:white;

transition:.25s;

box-shadow:

0 0 20px rgba(0,200,255,.35);

}

.modeButtons button:hover{

transform:translateY(-3px);

}

.switchRow{

display:flex;

justify-content:space-between;

align-items:center;

margin:24px 0;

}

.toggle{

width:70px;

height:36px;

background:#232842;

border-radius:100px;

position:relative;

cursor:pointer;

}

.toggle span{

position:absolute;

left:4px;

top:4px;

width:28px;

height:28px;

background:white;

border-radius:50%;

transition:.3s;

}

.toggle.active span{

left:38px;

}

.musicCard{

margin-top:20px;

padding:16px;

border-radius:18px;

background:rgba(255,255,255,.05);

}

.musicTitle{

font-weight:bold;

color:var(--yellow);

margin-bottom:10px;

}

.musicButtons{

display:flex;

gap:10px;

margin-bottom:12px;

}

.musicButtons button{

flex:1;

height:42px;

border:none;

border-radius:14px;

cursor:pointer;

font-weight:bold;

background:

linear-gradient(135deg,#ff00b7,#863bff);

color:white;

}

.musicButtons button:hover{

transform:scale(1.04);

}

#volume{

width:100%;

}

.boardPanel{

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

}

.status{

font-size:24px;

font-weight:700;

margin-bottom:25px;

color:var(--yellow);

text-shadow:

0 0 18px var(--yellow);

}

.board{

display:grid;

grid-template-columns:repeat(3,140px);

grid-template-rows:repeat(3,140px);

gap:12px;

position:relative;

}

.cell{

background:

rgba(255,255,255,.05);

border:2px solid rgba(255,255,255,.08);

border-radius:22px;

display:flex;

justify-content:center;

align-items:center;

font-size:72px;

cursor:pointer;

transition:.25s;

user-select:none;

}

.cell:hover{

transform:scale(1.05);

box-shadow:var(--shadow);

}

.cell.x{

color:var(--cyan);

text-shadow:var(--shadow);

}

.cell.o{

color:var(--pink);

text-shadow:

0 0 20px var(--pink);

}

.winLine{

position:absolute;

height:8px;

background:var(--green);

border-radius:50px;

box-shadow:

0 0 20px var(--green),

0 0 40px var(--green);

transform-origin:left center;

transform:scaleX(0);

transition:.5s;

pointer-events:none;

}

.controls{

display:flex;

gap:15px;

margin-top:28px;

flex-wrap:wrap;

justify-content:center;

}

.controls button{

padding:14px 26px;

border:none;

border-radius:18px;

cursor:pointer;

font-size:17px;

font-weight:bold;

color:white;

transition:.25s;

}

#restartBtn{

background:

linear-gradient(135deg,#00d56d,#00ff95);

}

#resetBtn{

background:

linear-gradient(135deg,#ff416c,#ff1744);

}

.controls button:hover{

transform:translateY(-3px);

}
.scoreTitle{

font-size:24px;

font-weight:900;

text-align:center;

margin-bottom:22px;

color:var(--green);

text-shadow:

0 0 18px rgba(0,255,150,.5);

}

.scoreGrid{

display:grid;

grid-template-columns:1fr 1fr;

gap:14px;

}

.scoreCard{

background:var(--panel2);

border-radius:18px;

padding:18px;

text-align:center;

transition:.25s;

}

.scoreCard:hover{

transform:translateY(-4px);

box-shadow:

0 0 18px rgba(0,247,255,.2);

}

.scoreCard h2{

margin-top:12px;

font-size:30px;

color:var(--cyan);

}

.info{

margin-top:25px;

line-height:2;

color:var(--muted);

}

.toast{

position:fixed;

top:25px;

left:50%;

transform:translateX(-50%);

background:rgba(0,0,0,.85);

border:2px solid var(--cyan);

padding:15px 34px;

border-radius:18px;

font-weight:bold;

font-size:18px;

opacity:0;

pointer-events:none;

transition:.35s;

z-index:9999;

}

.toast.show{

opacity:1;

}

.confetti{

position:fixed;

width:12px;

height:12px;

pointer-events:none;

z-index:999;

}

@media(max-width:1200px){

.container{

grid-template-columns:1fr;

}

.panel{

width:100%;

}

}

@media(max-width:650px){

.board{

grid-template-columns:repeat(3,100px);

grid-template-rows:repeat(3,100px);

gap:10px;

}

.cell{

font-size:58px;

border-radius:18px;

}

.logo{

font-size:28px;

}

.status{

font-size:20px;

}

.controls{

flex-direction:column;

width:100%;

}

.controls button{

width:100%;

}

}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<div id="toast" class="toast"></div>

<audio
id="bgMusic"
src="music/hip hop dep {2025.04.06}.mp3"
loop
preload="auto">
</audio>

<div class="container">

<div class="panel">

<div class="logo">

NEON TIC TAC TOE

</div>

<div class="subtitle">

Ultimate Edition

</div>

<div class="modeButtons">

<button id="humanBtn">

👥 co-op

</button>

<button id="aiBtn">

🤖 play with bot

</button>

</div>

<div class="switchRow">

<span>

🌙 light mode

</span>

<div
id="themeToggle"
class="toggle">

<span></span>

</div>

</div>

<div class="musicCard">

<div class="musicTitle">

🎵 music

</div>

<div class="musicButtons">

<button id="playBtn">

▶ play

</button>

<button id="pauseBtn">

⏸ stop

</button>

</div>

<input

id="volume"

type="range"

min="0"

max="1"

step=".01"

value=".4"

>

</div>

</div>

<div class="panel boardPanel">

<div
id="status"
class="status">

game start

</div>

<div style="position:relative">

<div
id="winLine"
class="winLine">

</div>

<div
id="board"
class="board">

<div class="cell" data-index="0"></div>
<div class="cell" data-index="1"></div>
<div class="cell" data-index="2"></div>

<div class="cell" data-index="3"></div>
<div class="cell" data-index="4"></div>
<div class="cell" data-index="5"></div>

<div class="cell" data-index="6"></div>
<div class="cell" data-index="7"></div>
<div class="cell" data-index="8"></div>

</div>

</div>

<div class="controls">

<button id="restartBtn">

🔄 new game

</button>

<button id="resetBtn">

🏆 reset points

</button>

</div>

</div>

<div class="panel">

<div class="scoreTitle">

🏆 table

</div>

<div class="scoreGrid">

<div class="scoreCard">

❌ X

<h2 id="xScore">0</h2>

</div>

<div class="scoreCard">

⭕ O

<h2 id="oScore">0</h2>

</div>

<div class="scoreCard">

🤝 Equal

<h2 id="drawScore">0</h2>

</div>

<div class="scoreCard">

🎮 game

<h2 id="gameScore">0</h2>

</div>

</div>

<div class="info">

<p id="modeText">

co-op

</p>

<p id="turnText">

turn:X

</p>

<p>

 🤖 Minmax ai

</p>

<p>

💾 auto save points

</p>

</div>

</div>

</div>

<script>
//==============================
// Neon Tic Tac Toe Ultimate
// JavaScript
//==============================

const boardElement=document.getElementById("board");
const cells=[...document.querySelectorAll(".cell")];

const status=document.getElementById("status");
const turnText=document.getElementById("turnText");
const modeText=document.getElementById("modeText");

const restartBtn=document.getElementById("restartBtn");
const resetBtn=document.getElementById("resetBtn");

const humanBtn=document.getElementById("humanBtn");
const aiBtn=document.getElementById("aiBtn");

const playBtn=document.getElementById("playBtn");
const pauseBtn=document.getElementById("pauseBtn");

const music=document.getElementById("bgMusic");
const volume=document.getElementById("volume");

const toast=document.getElementById("toast");

const themeToggle=document.getElementById("themeToggle");

const winLine=document.getElementById("winLine");

const xScore=document.getElementById("xScore");
const oScore=document.getElementById("oScore");
const drawScore=document.getElementById("drawScore");
const gameScore=document.getElementById("gameScore");

const STORAGE="NEON_TTT_SAVE";

const WINS=[

[0,1,2],

[3,4,5],

[6,7,8],

[0,3,6],

[1,4,7],

[2,5,8],

[0,4,8],

[2,4,6]

];

let board=[];

let currentPlayer="X";

let gameOver=false;

let vsAI=false;

let firstInteraction=false;

let score={

x:0,

o:0,

draw:0,

games:0

};

function saveScore(){

localStorage.setItem(

STORAGE,

JSON.stringify(score)

);

}

function loadScore(){

const data=localStorage.getItem(STORAGE);

if(!data)return;

try{

score=JSON.parse(data);

}catch(e){}

updateScore();

}

function updateScore(){

xScore.textContent=score.x;

oScore.textContent=score.o;

drawScore.textContent=score.draw;

gameScore.textContent=score.games;

saveScore();

}

function toastMessage(text){

toast.textContent=text;

toast.classList.add("show");

clearTimeout(toast.timer);

toast.timer=setTimeout(()=>{

toast.classList.remove("show");

},1800);

}

music.volume=.4;

volume.oninput=()=>{

music.volume=volume.value;

};

playBtn.onclick=()=>{

music.play();

};

pauseBtn.onclick=()=>{

music.pause();

};

function startMusic(){

if(firstInteraction)return;

firstInteraction=true;

music.play().catch(()=>{});

}

themeToggle.onclick=()=>{

document.body.classList.toggle("light");

themeToggle.classList.toggle("active");

};

function resetBoard(){

board=[

"","","",

"","","",

"","",""

];

currentPlayer="X";

gameOver=false;

status.textContent="نوبت بازیکن X";

turnText.textContent="نوبت: X";

winLine.style.transform="scaleX(0)";

cells.forEach(cell=>{

cell.textContent="";

cell.className="cell";

});

}

restartBtn.onclick=()=>{

resetBoard();

};

resetBtn.onclick=()=>{

score={

x:0,

o:0,

draw:0,

games:0

};

updateScore();

toastMessage("امتیازات پاک شد");

};

humanBtn.onclick=()=>{

vsAI=false;

modeText.textContent="حالت: دونفره";

resetBoard();

toastMessage("حالت دونفره");

};

aiBtn.onclick=()=>{

vsAI=true;

modeText.textContent="حالت: بازی با ربات";

resetBoard();

toastMessage("ربات فعال شد");

};

cells.forEach(cell=>{

cell.addEventListener("click",()=>{

startMusic();

const index=Number(cell.dataset.index);

if(gameOver)return;

if(board[index]!="")return;

move(index,currentPlayer);

if(

vsAI &&

!gameOver &&

currentPlayer==="O"

){

setTimeout(aiMove,300);

}

});

});

function move(index,player){

board[index]=player;

cells[index].textContent=player;

cells[index].classList.add(

player.toLowerCase()

);

const result=checkWinner(board);

if(result){

finishGame(result);

return;

}

currentPlayer=

player==="X"

?

"O"

:

"X";

status.textContent=

"نوبت بازیکن "+currentPlayer;

turnText.textContent=

"نوبت: "+currentPlayer;

}
function checkWinner(state){

for(const line of WINS){

const[a,b,c]=line;

if(

state[a]!=="" &&

state[a]===state[b] &&

state[b]===state[c]

){

return{

winner:state[a],

line

};

}

}

if(state.every(cell=>cell!="")){

return{

winner:"draw"

};

}

return null;

}

function finishGame(result){

gameOver=true;

score.games++;

if(result.winner==="draw"){

score.draw++;

updateScore();

status.textContent="🤝 بازی مساوی شد";

turnText.textContent="مساوی";

toastMessage("بازی مساوی شد");

playTone(350,.18);

return;

}

if(result.winner==="X"){

score.x++;

playTone(820,.25);

}else{

score.o++;

playTone(520,.25);

}

updateScore();

status.textContent=

`🏆 ${result.winner} برنده شد`;

turnText.textContent=

`برنده: ${result.winner}`;

toastMessage(

`${result.winner} برنده شد`

);

drawWinLine(result.line);

confetti();

}

function playTone(freq,time){

const ctx=new(

window.AudioContext||

window.webkitAudioContext

)();

const osc=ctx.createOscillator();

const gain=ctx.createGain();

osc.frequency.value=freq;

osc.type="triangle";

osc.connect(gain);

gain.connect(ctx.destination);

gain.gain.value=.08;

osc.start();

gain.gain.exponentialRampToValueAtTime(

0.0001,

ctx.currentTime+time

);

osc.stop(

ctx.currentTime+time

);

}

function aiMove(){

let bestScore=-Infinity;

let moveIndex=-1;

for(let i=0;i<9;i++){

if(board[i]==""){

board[i]="O";

let score=minimax(

board,

0,

false

);

board[i]="";

if(score>bestScore){

bestScore=score;

moveIndex=i;

}

}

}

if(moveIndex!==-1){

move(moveIndex,"O");

}

}

function minimax(state,depth,isMax){

const result=checkWinner(state);

if(result){

if(result.winner==="O"){

return 10-depth;

}

if(result.winner==="X"){

return depth-10;

}

return 0;

}

if(isMax){

let best=-Infinity;

for(let i=0;i<9;i++){

if(state[i]==""){

state[i]="O";

best=Math.max(

best,

minimax(

state,

depth+1,

false

)

);

state[i]="";

}

}

return best;

}

let best=Infinity;

for(let i=0;i<9;i++){

if(state[i]==""){

state[i]="X";

best=Math.min(

best,

minimax(

state,

depth+1,

true

)

);

state[i]="";

}

}

return best;

}

function drawWinLine(line){

const rect=

boardElement.getBoundingClientRect();

const cell=

rect.width/3;

const map={

"0,1,2":{

x:0,

y:cell*.5,

w:rect.width,

r:0

},

"3,4,5":{

x:0,

y:cell*1.5,

w:rect.width,

r:0

},

"6,7,8":{

x:0,

y:cell*2.5,

w:rect.width,

r:0

},

"0,3,6":{

x:cell*.5,

y:0,

w:rect.height,

r:90

},

"1,4,7":{

x:cell*1.5,

y:0,

w:rect.height,

r:90

},

"2,5,8":{

x:cell*2.5,

y:0,

w:rect.height,

r:90

},

"0,4,8":{

x:0,

y:0,

w:Math.sqrt(

rect.width**2+

rect.height**2

),

r:45

},

"2,4,6":{

x:rect.width,

y:0,

w:Math.sqrt(

rect.width**2+

rect.height**2

),

r:135

}

};

const key=line.join(",");

const d=map[key];

winLine.style.left=d.x+"px";

winLine.style.top=d.y+"px";

winLine.style.width=d.w+"px";

winLine.style.transform=

`rotate(${d.r}deg) scaleX(1)`;

}
function confetti(){

const colors=[

"#00F7FF",

"#ff00b7",

"#00ff95",

"#ffd54f",

"#ff416c",

"#ffffff"

];

for(let i=0;i<60;i++){

const piece=document.createElement("div");

piece.className="confetti";

piece.style.left=Math.random()*100+"vw";

piece.style.top="-20px";

piece.style.width=6+Math.random()*10+"px";

piece.style.height=6+Math.random()*10+"px";

piece.style.borderRadius=Math.random()>.5?"50%":"2px";

piece.style.background=

colors[Math.floor(

Math.random()*colors.length

)];

document.body.appendChild(piece);

const x=(Math.random()-.5)*700;

const y=window.innerHeight+300;

piece.animate(

[

{

transform:

"translate(0,0) rotate(0deg)",

opacity:1

},

{

transform:

`translate(${x}px,${y}px)
rotate(${Math.random()*1080}deg)`,

opacity:0

}

],

{

duration:

2200+

Math.random()*1800,

easing:"cubic-bezier(.2,.8,.2,1)"

}

);

setTimeout(()=>{

piece.remove();

},4200);

}

}

const canvas=

document.getElementById("particles");

const ctx=

canvas.getContext("2d");

let particles=[];

function resizeCanvas(){

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

}

window.addEventListener(

"resize",

resizeCanvas

);

resizeCanvas();

function createParticles(){

particles=[];

for(let i=0;i<90;i++){

particles.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

r:1+Math.random()*3,

dx:-0.4+Math.random()*.8,

dy:-0.4+Math.random()*.8

});

}

}

createParticles();

function animateParticles(){

ctx.clearRect(

0,

0,

canvas.width,

canvas.height

);

particles.forEach(p=>{

p.x+=p.dx;

p.y+=p.dy;

if(p.x<0)p.x=canvas.width;

if(p.x>canvas.width)p.x=0;

if(p.y<0)p.y=canvas.height;

if(p.y>canvas.height)p.y=0;

ctx.beginPath();

ctx.arc(

p.x,

p.y,

p.r,

0,

Math.PI*2

);

ctx.fillStyle=

"rgba(0,247,255,.85)";

ctx.shadowBlur=20;

ctx.shadowColor="#00F7FF";

ctx.fill();

});

for(let i=0;i<particles.length;i++){

for(let j=i+1;j<particles.length;j++){

const a=particles[i];

const b=particles[j];

const dist=Math.hypot(

a.x-b.x,

a.y-b.y

);

if(dist<80){

ctx.beginPath();

ctx.moveTo(

a.x,

a.y

);

ctx.lineTo(

b.x,

b.y

);

ctx.strokeStyle=

`rgba(0,247,255,${
1-dist/80
})`;

ctx.lineWidth=1;

ctx.stroke();

}

}

}

requestAnimationFrame(

animateParticles

);

}

animateParticles();

function keyboard(){

document.addEventListener(

"keydown",

e=>{

switch(e.key.toLowerCase()){

case"r":

restartBtn.click();

break;

case"1":

humanBtn.click();

break;

case"2":

aiBtn.click();

break;

case"m":

if(music.paused){

music.play();

}else{

music.pause();

}

break;

case"t":

themeToggle.click();

break;

}

}

);

}

keyboard();

loadScore();

resetBoard();
let glowHue=180;

setInterval(()=>{

glowHue+=0.4;

document.documentElement.style.setProperty(

"--cyan",

`hsl(${glowHue},100%,55%)`

);

},200);

function pulseStatus(){

status.animate(

[

{

transform:"scale(1)",

opacity:1

},

{

transform:"scale(1.06)",

opacity:.82

},

{

transform:"scale(1)",

opacity:1

}

],

{

duration:900

}

);

}

setInterval(

()=>{

if(!gameOver){

pulseStatus();

}

},

1200

);

function flashBoard(){

boardElement.animate(

[

{

transform:"scale(1)",

filter:"brightness(1)"

},
